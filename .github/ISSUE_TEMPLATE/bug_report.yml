name: "Bug Report"
description: Report a bug or defect in an existing feature.
title: "[Ticket #] - [Bug] - [Short Bug Summary]"
labels: ["bug"]
projects: ["tentative12345/3"]
assignees: []
body:
  - type: dropdown
    id: priority
    attributes:
      label: Priority / Severity
      description: How severe is the impact of this bug?
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: input
    id: related-ticket
    attributes:
      label: Related Ticket #
      description: "The task ticket this module was built under. Format: Sprint#-Epic#-Module# - Module Name"
      placeholder: "03-02-01 - Live Selling"
    validations:
      required: true

  - type: input
    id: epic
    attributes:
      label: Epic
      placeholder: "02 - Live Selling & Streaming"
    validations:
      required: true

  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line summary of the bug
      placeholder: "Livestream remains stuck on loading while audio continues to play"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Detailed explanation of the bug
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected-result
    attributes:
      label: Expected Result
      description: What should happen
    validations:
      required: true

  - type: textarea
    id: actual-result
    attributes:
      label: Actual Result
      description: What actually happens
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Platform, browser/device, OS, app version, etc.
      placeholder: |
        Platform: Web App
        Browser/Device:
        OS:
        App Version:
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Video / Logs
      description: Attach any visual evidence, console logs, or network traces
    validations:
      required: false

